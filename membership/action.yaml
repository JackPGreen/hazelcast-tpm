name: Check membership
description: Checks the PR is trusted for execution - either manually triggered, or the author is a trusted collaborator of the repo
outputs:
  check-result:
    description: Membership check result
    value: ${{ steps.membership-check.outputs.check-result }}
runs:
  using: composite
  steps:
    - id: membership-check
      shell: bash
      run: |
        set -o errexit -o nounset -o pipefail ${RUNNER_DEBUG:+-x}

        # Manual executions are always trusted - if a user has permission to run the workflow, we respect that
        # Otherwise, assume pull_request and check the authors association - outpus documented in https://docs.github.com/en/graphql/reference/enums#commentauthorassociation
        if [[ \
            "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || \
            "${{ github.event.pull_request.author_association }}" =~ ^(MEMBER|OWNER|COLLABORATOR)$ \
        ]]; then
          echo "check-result=true" >> ${GITHUB_OUTPUT}
        else
          echo "check-result=false" >> ${GITHUB_OUTPUT}
        fi
