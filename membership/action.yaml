name: Check membership
inputs:
  member-name:
    required: true
  token:
    required: true
outputs:
  check-result:
    description: Membership check result
    value: ${{ steps.membership-check.outputs.check-result }}
runs:
  using: composite
  steps:
    - id: membership-check
      shell: bash
      run: |-
        if [[ "${GITHUB_REPOSITORY_OWNER}" == "${{ inputs.member-name }}" ]] || gh api "repos/${GITHUB_REPOSITORY}/collaborators/${{ inputs.member-name }}"; then
          echo "check-result=true" >> ${GITHUB_OUTPUT}
        else
          echo "check-result=false" >> ${GITHUB_OUTPUT}
        fi
      env:
        GH_TOKEN: ${{ inputs.token }}
